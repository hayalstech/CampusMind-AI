<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Football Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Guess The Football Player</h1>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search by name or nationality...">
                <button id="reset-btn" class="reset-btn">Reset All Cards</button>
            </div>
            <p class="subtitle">Click on a card to flip it and hide/show the player</p>
        </header>

        <main>
            <div class="players-grid" id="players-grid">
                <!-- Players will be generated by JavaScript -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
